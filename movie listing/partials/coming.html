<!-- Movies Catalog Page -->
<div id="comingPage" class="page">
    <div class="container">
        <div class="hero">
            <h1>Movie <span class="purple-text">Catalog</span></h1>
            <p>Browse all movies currently showing at CineX</p>
        </div>
        <div class="movies-table-wrapper">
            <table class="movies-table">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Genre</th>
                        <th>Rating</th>
                        <th>Duration</th>
                        <th>Format</th>
                        <th>Showtimes</th>
                    </tr>
                </thead>
                <tbody id="moviesTableBody">
                    <!-- Movies loaded from XML will be inserted here -->
                </tbody>
            </table>
        </div>
        <div class="info-section link-section">
            <p><a href="#" class="nav-link" data-page="home" style="color: #c084fc; font-weight: 600; text-decoration: underline;">← Back to Home</a></p>
        </div>
    </div>
</div>
