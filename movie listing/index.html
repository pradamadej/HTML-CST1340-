<html lang="en">
<head>

</head>
<body>

<div id="site-header"></div>
<main id="site-content"></main>
<div id="site-footer"></div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
async function loadLayout() {
    const cacheBust = `?cache=${Date.now()}`;

    const header = await fetch(`partials/header.html${cacheBust}`).then(r => r.text());
    const home = await fetch(`partials/home.html${cacheBust}`).then(r => r.text());
    const coming = await fetch(`partials/coming.html${cacheBust}`).then(r => r.text());
    const footer = await fetch(`partials/footer.html${cacheBust}`).then(r => r.text());

    document.getElementById('site-header').innerHTML = header;
    document.getElementById('site-content').innerHTML = home + coming;
    document.getElementById('site-footer').innerHTML = footer;
}

// Load XSL page
function loadCinemaTable() {
    const container = document.getElementById("comingPage");

    container.innerHTML = `
        <iframe src="movies.xml"
                style="width:100%; height:100vh; border:none;">
        </iframe>
    `;
}

//  Loads movies for carousel
async function loadMoviesForCarousel() {
    try {
        const response = await fetch("movies.xml");
        const xmlText = await response.text();

        const parser = new DOMParser();
        const xml = parser.parseFromString(xmlText, "text/xml");

        const movies = xml.querySelectorAll("now_showing > movie");

        const carousel = document.getElementById("nowShowingCarousel");

        if (!carousel) return;

        carousel.innerHTML = Array.from(movies).map(movie => {
            const title = movie.querySelector("title")?.textContent;
            const image = movie.querySelector("image")?.textContent;

            return `
                <div class="swiper-slide">
                    <div class="movie-card">
                        <img src="${image}" alt="${title}">
                        <h3>${title}</h3>
                    </div>
                </div>
            `;
        }).join('');

        new Swiper('.now-showing-swiper', {
            slidesPerView: 1.2,
            spaceBetween: 15,
            loop: true
        });

    } catch (err) {
        console.error("Carousel error:", err);
    }
}

//  Navigation
function setupPages() {
    const homePage = document.getElementById('homePage');
    const comingPage = document.getElementById('comingPage');
    const navLinks = document.querySelectorAll('.nav-link');

    navLinks.forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            const page = link.dataset.page;

            if (page === 'home') {
                homePage.classList.add('active');
                comingPage.classList.remove('active');
            }

            if (page === 'coming') {
                homePage.classList.remove('active');
                comingPage.classList.add('active');
                loadCinemaTable();
            }
        });
    });

    homePage.classList.add('active');
}

async function init() {
    await loadLayout();
    setupPages();
    loadMoviesForCarousel(); 
}

document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
