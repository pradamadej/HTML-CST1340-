<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineX - Movie Tracker</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700&display=swap" rel="stylesheet">
    <!-- Swiper CSS (for carousel) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <!-- Font Awesome (for icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Placeholder for external structure sections -->
<div id="site-header"></div>
<main id="site-content"></main>
<div id="site-footer"></div>

<!-- ========== SCRIPTS ========== -->
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    async function loadSectionedLayout() {
        try {
            const [headerRes, homeRes, comingRes, footerRes] = await Promise.all([
                fetch('partials/header.html'),
                fetch('partials/home.html'),
                fetch('partials/coming.html'),
                fetch('partials/footer.html')
            ]);

            const headerHtml = await headerRes.text();
            const homeHtml = await homeRes.text();
            const comingHtml = await comingRes.text();
            const footerHtml = await footerRes.text();

            document.getElementById('site-header').innerHTML = headerHtml;
            document.getElementById('site-content').innerHTML = homeHtml + comingHtml;
            document.getElementById('site-footer').innerHTML = footerHtml;
        } catch (err) {
            console.error('Error loading layout:', err);
        }
    }

    // ========== MOVIE DATA ==========
    let moviesData = [];

    async function loadMoviesFromXml() {
        try {
            const response = await fetch('movies.xml');
            if (!response.ok) throw new Error('Could not load movies.xml');
            const xmlText = await response.text();
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, 'application/xml');

            if (xmlDoc.getElementsByTagName("parsererror").length > 0) {
                throw new Error('XML parsing error');
            }

            // Load now_showing movies
            moviesData = Array.from(xmlDoc.querySelectorAll('now_showing > movie')).map(node => {
                const showtimes = Array.from(node.querySelectorAll('showtimes > time'))
                    .map(t => t.textContent.trim())
                    .join(', ');
                
                return {
                    id: node.getAttribute('id'),
                    title: node.querySelector('title')?.textContent.trim() || 'Unknown',
                    genre: node.querySelector('genre > type')?.textContent.trim() || 'Unknown',
                    rating: node.querySelector('rating')?.textContent.trim() || '—',
                    duration: node.querySelector('duration')?.textContent.trim() || '—',
                    format: node.querySelector('format')?.textContent.trim() || '—',
                    showtimes: showtimes || '—'
                };
            });

            console.log(`Loaded ${moviesData.length} movies from XML`);
        } catch (err) {
            console.error('Error loading movies:', err);
        }
    }

    function buildMoviesTable() {
        const tableBody = document.getElementById("moviesTableBody");
        if (!tableBody) return;
        
        tableBody.innerHTML = "";
        
        for (let movie of moviesData) {
            const row = tableBody.insertRow();
            row.innerHTML = `
                <td><strong>${movie.title}</strong></td>
                <td>${movie.genre}</td>
                <td>${movie.rating}</td>
                <td>${movie.duration}</td>
                <td>${movie.format}</td>
                <td><em>${movie.showtimes}</em></td>
            `;
        }
    }

    function setupNavigation() {
        const homePageDiv = document.getElementById("homePage");
        const comingPageDiv = document.getElementById("comingPage");
        const navLinks = document.querySelectorAll(".nav-link");

        console.log("Setting up navigation...");
        console.log("homePage exists:", !!homePageDiv);
        console.log("comingPage exists:", !!comingPageDiv);
        console.log("navLinks found:", navLinks.length);

        if (!homePageDiv || !comingPageDiv) {
            console.error("Page elements not found! Check HTML structure.");
            return;
        }

        function switchPage(pageName) {
            console.log("Switching to page:", pageName);
            if (pageName === "home") {
                homePageDiv.classList.add("active");
                comingPageDiv.classList.remove("active");
            } else if (pageName === "coming") {
                homePageDiv.classList.remove("active");
                comingPageDiv.classList.add("active");
                buildMoviesTable();
            }
            navLinks.forEach(link => {
                const linkPage = link.getAttribute("data-page");
                if (linkPage === pageName) {
                    link.classList.add("active");
                } else {
                    link.classList.remove("active");
                }
            });
        }

        navLinks.forEach(link => {
            link.addEventListener("click", function(e) {
                e.preventDefault();
                const page = this.getAttribute("data-page");
                console.log("Nav link clicked, page:", page);
                if (page) switchPage(page);
            });
        });

        const bellBtn = document.getElementById("notifyBell");
        if (bellBtn) {
            bellBtn.addEventListener("click", function() {
                alert("Subscribe to CineX alerts for new movie releases and special offers!");
            });
        }
        switchPage("home");
    }

    function init() {
        buildMoviesTable();
        setupNavigation();
    }

    loadSectionedLayout()
        .then(() => loadMoviesFromXml())
        .then(init)
        .catch(err => {
            console.error("Initialization error:", err);
            init();
        });
</script>
        });
</script>
</body>
</html>
